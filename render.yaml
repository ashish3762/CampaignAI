# Render.com blueprint — creates the single web service that hosts both the
# API and the built client. Push this repo to GitHub, click "New Blueprint"
# in Render, point it at the repo, and fill in the two Supabase env vars.
services:
  - type: web
    name: campaignai
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Baked into the client bundle at build time — set these before the first deploy.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      # Stripe + service role key — leave empty unless PAYWALL_ENABLED flips to true.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
